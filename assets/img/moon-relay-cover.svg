<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Communications relay satellite orbiting the Moon">
  <defs>
    <radialGradient id="bg" cx="62%" cy="34%" r="85%">
      <stop offset="0%" stop-color="#1a1d22"/>
      <stop offset="55%" stop-color="#111317"/>
      <stop offset="100%" stop-color="#0a0b0d"/>
    </radialGradient>
    <radialGradient id="moon" cx="38%" cy="36%" r="68%">
      <stop offset="0%" stop-color="#e9ecf1"/>
      <stop offset="55%" stop-color="#b9bec7"/>
      <stop offset="100%" stop-color="#6f747d"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#aeb4be"/>
      <stop offset="100%" stop-color="#6c727c"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e4e7ec"/>
      <stop offset="100%" stop-color="#9aa1ac"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- starfield -->
  <g fill="#ffffff">
    <circle cx="120" cy="120" r="1.6" opacity=".55"/><circle cx="300" cy="80" r="1.1" opacity=".4"/>
    <circle cx="520" cy="160" r="1.4" opacity=".5"/><circle cx="760" cy="90" r="1" opacity=".35"/>
    <circle cx="980" cy="140" r="1.5" opacity=".5"/><circle cx="1180" cy="70" r="1.1" opacity=".4"/>
    <circle cx="1380" cy="150" r="1.6" opacity=".55"/><circle cx="1500" cy="300" r="1.2" opacity=".4"/>
    <circle cx="180" cy="380" r="1.2" opacity=".4"/><circle cx="90" cy="600" r="1.5" opacity=".5"/>
    <circle cx="240" cy="780" r="1.1" opacity=".35"/><circle cx="620" cy="820" r="1.4" opacity=".5"/>
    <circle cx="1320" cy="760" r="1.2" opacity=".4"/><circle cx="1480" cy="640" r="1.5" opacity=".5"/>
    <circle cx="1040" cy="800" r="1" opacity=".3"/><circle cx="1240" cy="460" r="1.3" opacity=".45"/>
  </g>

  <!-- orbit path -->
  <ellipse cx="560" cy="470" rx="640" ry="300" fill="none" stroke="#c9ced7" stroke-opacity=".22" stroke-width="2" stroke-dasharray="2 12"/>

  <!-- Moon -->
  <g>
    <circle cx="560" cy="470" r="250" fill="url(#moon)"/>
    <circle cx="560" cy="470" r="250" fill="#0a0b0d" opacity="0" />
    <!-- craters -->
    <g fill="#8b9098" opacity=".55">
      <circle cx="480" cy="400" r="34"/><circle cx="640" cy="430" r="22"/>
      <circle cx="520" cy="560" r="40"/><circle cx="660" cy="540" r="16"/>
      <circle cx="430" cy="500" r="18"/><circle cx="600" cy="360" r="14"/>
    </g>
    <g fill="#f1f3f6" opacity=".35">
      <circle cx="474" cy="392" r="34"/><circle cx="514" cy="552" r="40"/>
    </g>
    <!-- terminator shading -->
    <path d="M560 220 a250 250 0 0 1 0 500 a250 250 0 0 0 0 -500" fill="#0a0b0d" opacity=".28"/>
  </g>

  <!-- Relay satellite (top-right of orbit) -->
  <g transform="translate(1120 250) rotate(18)">
    <!-- solar panels -->
    <rect x="-230" y="-34" width="150" height="68" rx="6" fill="url(#panel)"/>
    <rect x="80" y="-34" width="150" height="68" rx="6" fill="url(#panel)"/>
    <g stroke="#3a3f47" stroke-width="2">
      <line x1="-192" y1="-34" x2="-192" y2="34"/><line x1="-155" y1="-34" x2="-155" y2="34"/><line x1="-118" y1="-34" x2="-118" y2="34"/>
      <line x1="118" y1="-34" x2="118" y2="34"/><line x1="155" y1="-34" x2="155" y2="34"/><line x1="192" y1="-34" x2="192" y2="34"/>
    </g>
    <!-- bus -->
    <rect x="-58" y="-46" width="116" height="92" rx="10" fill="url(#metal)" stroke="#5c626c" stroke-width="2"/>
    <!-- high-gain dish -->
    <ellipse cx="0" cy="-92" rx="58" ry="28" fill="url(#metal)" stroke="#5c626c" stroke-width="2"/>
    <line x1="0" y1="-92" x2="0" y2="-46" stroke="#7c828c" stroke-width="4"/>
    <circle cx="0" cy="-92" r="6" fill="#e4e7ec"/>
  </g>

  <!-- comm beam: satellite -> moon surface -->
  <g stroke="#c9ced7" stroke-opacity=".5" stroke-width="2" fill="none">
    <path d="M1120 250 L 690 330" stroke-dasharray="3 9"/>
    <path d="M1120 250 L 740 300" stroke-dasharray="3 9" stroke-opacity=".3"/>
  </g>
</svg>
